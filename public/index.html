<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Hidden Object Battle</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --jungle-green: #1a2e1a;
            --accent-gold: #ffcc00;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--jungle-green); 
            color: white; 
            overflow-x: hidden;
            text-align: center;
        }

        /* SCREENS */
        .screen { display: none; padding: 20px; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        /* LOGIN BOX */
        .login-card {
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--accent-gold);
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        button {
            background: var(--accent-gold);
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); }

        /* TIMER & HUD */
        #hud {
            position: fixed;
            top: 20px;
            width: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .timer-box {
            background: rgba(0,0,0,0.8);
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid var(--accent-gold);
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-gold);
        }

        /* THE GAME BOARD */
        #game-area {
            position: relative;
            width: 1500px; /* Base Width */
            height: 857px; /* Base Height */
            max-width: 95vw;
            margin: 20px auto;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #000;
            border: 4px solid #2d5a27;
            /* Anti-Scrub Cursor */
            cursor: crosshair !important;
            aspect-ratio: 1500 / 857;
        }

        #hit-area {
            position: absolute;
            border-radius: 50%;
            z-index: 10;
            /* border: 2px solid red; */ /* Uncomment to test placement */
            cursor: crosshair !important;
        }

        /* LEADERBOARD PODIUM */
        .podium-item {
            background: rgba(255,255,255,0.1);
            margin: 5px;
            padding: 15px;
            width: 80%;
            max-width: 500px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
